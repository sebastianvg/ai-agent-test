<div class="page">
  <div class="page__header">
    <h1 class="page__title">Account Settings</h1>
    <p class="page__subtitle">Manage your profile, password and security preferences.</p>
  </div>

  <div class="settings-sections">
    <section class="settings-card">
      <h2 class="settings-card__title">Profile</h2>
      <div class="profile-section">
        <div class="avatar">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <button class="btn btn--outline btn--sm">Change Photo</button>
      </div>
      <div class="settings-list">
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">Full Name</label>
          </div>
          <input class="settings-input" type="text" value="Alex Johnson" aria-label="Full Name"/>
        </div>
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">Email Address</label>
          </div>
          <input class="settings-input" type="email" value="alex@example.com" aria-label="Email Address"/>
        </div>
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">Role</label>
          </div>
          <input class="settings-input" type="text" value="Administrator" readonly aria-label="Role"/>
        </div>
      </div>
    </section>

    <section class="settings-card">
      <h2 class="settings-card__title">Security</h2>
      <div class="settings-list">
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">Current Password</label>
          </div>
          <input class="settings-input" type="password" placeholder="Enter current password" aria-label="Current Password"/>
        </div>
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">New Password</label>
          </div>
          <input class="settings-input" type="password" placeholder="Enter new password" aria-label="New Password"/>
        </div>
        <div class="settings-row">
          <div class="settings-row__info">
            <label class="settings-row__label">Two-Factor Auth</label>
            <p class="settings-row__desc">Add an extra layer of security to your account.</p>
          </div>
          <label class="toggle" aria-label="Two-Factor Auth">
            <input class="toggle__input" type="checkbox"/>
            <span class="toggle__track"></span>
          </label>
        </div>
      </div>
    </section>
  </div>

  <div class="settings-actions">
    <button class="btn btn--outline">Cancel</button>
    <button class="btn btn--primary">Save Changes</button>
  </div>
</div>
