<header class="header">
  <div class="header__left">
    <button class="header__toggle" (click)="onToggleSidebar()" aria-label="Toggle sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <div class="header__brand">
      <svg class="header__logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#0ea5e9"/>
        <path d="M10 20 L20 10 L30 20 L20 30 Z" fill="white" opacity="0.9"/>
        <circle cx="20" cy="20" r="5" fill="#38bdf8"/>
      </svg>
      <span class="header__app-name">NexusHub</span>
    </div>
  </div>

  <div class="header__right">
    <button class="header__account-btn" routerLink="/account-settings" aria-label="Account settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span>Account</span>
    </button>
  </div>
</header>
